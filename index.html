<!DOCTYPE html>
<html>
<head>
  <title>Rishaan Daily Needs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #e6f9e6, #ffffcc);
    }

    header {
      background: linear-gradient(to right, #2e7d32, #fbc02d);
      padding: 20px;
      text-align: center;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    header p {
      margin: 5px 0 0;
      font-size: 14px;
    }

    .banner {
      background: linear-gradient(to right, #4caf50, #ffeb3b);
      padding: 30px 15px;
      text-align: center;
      color: #222;
      font-size: 20px;
      font-weight: bold;
    }

    .section-title {
      text-align: center;
      margin: 25px 0 10px;
      font-size: 20px;
      color: #2e7d32;
      font-weight: bold;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .category-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      font-weight: bold;
      color: #2e7d32;
      transition: 0.3s;
    }

    .category-card:hover {
      transform: scale(1.05);
    }

    footer {
      background: #2e7d32;
      color: white;
      text-align: center;
      padding: 12px;
      margin-top: 20px;
      font-size: 14px;
    }

  </style>
</head>

<body>

  <header>
    <h1>RISHAAN DUBEY</h1>
    <p>Rishaan Daily Needs Grocery Store</p>
  </header>

  <div class="banner">
    🛒 Fresh Grocery | Best Price | Fast Delivery 🚀
  </div>

  <div class="section-title">
    Shop By Category
  </div>

  <div class="categories">
    <div class="category-card">Rice & Atta</div>
    <div class="category-card">Oil & Masala</div>
    <div class="category-card">Snacks</div>
    <div class="category-card">Beverages</div>
    <div class="category-card">Dairy Products</div>
    <div class="category-card">Daily Essentials</div>
  </div>

  <footer>
    © 2026 Rishaan Daily Needs | All Rights Reserved
  </footer>

</body>
</html>
