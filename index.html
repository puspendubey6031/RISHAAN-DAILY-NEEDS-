<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishaan Daily Needs</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f8f8f8; }
  header { position: fixed; top:0; left:0; right:0; background:#2e7d32; color:white; padding:15px; z-index:10; display:flex; justify-content:space-between; align-items:center; }
  header h1 { margin:0; font-size:20px; }
  header select { padding:5px; border-radius:5px; border:none; }
  .slogan { margin-top:70px; text-align:center; padding:10px; }
  .slogan span { display:block; font-size:18px; font-weight:bold; padding:5px 0; }
  .slogan .doorstep { color: #fbc02d; }
  .slogan .premium-price { color: #d32f2f; }
  .slogan .premium-quality { color: #388e3c; }
  .categories { display:flex; overflow-x:auto; padding:10px; gap:10px; margin:10px; }
  .category { flex:0 0 auto; text-align:center; }
  .category img { width:60px; height:60px; border-radius:50%; object-fit:cover; }
  .products { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; padding-bottom:90px; }
  .product-card { background:white; border-radius:10px; padding:10px; width:150px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; }
  .product-card img { width:100%; height:100px; object-fit:cover; border-radius:5px; }
  .brand { font-weight:bold; color:#d32f2f; margin-top:5px; display:block; }
  .description { font-size:12px; color:#555; }
  .quantity { width:100%; margin:5px 0; }
  .add-btn { background:#2e7d32; color:white; border:none; padding:5px; width:100%; border-radius:5px; cursor:pointer; }
  .cart-bar { position: fixed; bottom:0; left:0; right:0; background:#333; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px; gap:10px; }
  .cart-info { font-size:14px; }
  .order-btn { background:#2e7d32; border:none; padding:10px; color:white; border-radius:5px; cursor:pointer; }
  .admin-btn { background:#d32f2f; border:none; padding:10px; color:white; border-radius:5px; cursor:pointer; }
  select, input[type=number] { border-radius:5px; padding:5px; width:100%; margin:3px 0; }
</style>
</head>
<body>

<header>
  <h1>Rishaan Daily Needs</h1>
  <select>
    <option value="en">EN</option>
    <option value="bn">BN</option>
  </select>
</header>

<div class="slogan">
  <span class="doorstep">Doorstep Delivery</span>
  <span class="premium-price">Premium Price</span>
  <span class="premium-quality">Premium Quality</span>
</div>

<div class="categories">
  <div class="category"><img src="https://i.imgur.com/1X2t1kK.jpg" alt="Rice"><br>Rice</div>
  <div class="category"><img src="https://i.imgur.com/YUQv7rC.jpg" alt="Oil"><br>Oil</div>
  <div class="category"><img src="https://i.imgur.com/xj1mjTl.jpg" alt="Snacks"><br>Snacks</div>
  <div class="category"><img src="https://i.imgur.com/N0s8aVg.jpg" alt="Spices"><br>Spices</div>
  <div class="category"><img src="https://i.imgur.com/fZ9u5f9.jpg" alt="Pulses"><br>Pulses</div>
  <div class="category"><img src="https://i.imgur.com/2s0Bk6P.jpg" alt="Flour"><br>Flour</div>
  <div class="category"><img src="https://i.imgur.com/YhrxBCg.jpg" alt="Biscuits"><br>Biscuits</div>
  <div class="category"><img src="https://i.imgur.com/kk0v5vE.jpg" alt="Tea"><br>Tea</div>
</div>

<div class="products" id="product-list">
  <!-- Product cards dynamically added here by JS -->
</div>

<div class="cart-bar">
  <div class="cart-info" id="cart-info">Cart: 0 items | Total: ₹0</div>
  <button class="order-btn" onclick="orderNow()">Order Now</button>
  <button class="admin-btn" onclick="adminAccess()">Admin</button>
</div>

<script>
let products = [
  {name:"Sona Masoori Loose", brand:"Loose", desc:"Premium quality rice", price:5, type:"Loose", quantityOptions:["100 g","250 g","500 g","1 kg"]},
  {name:"Basmati Rice", brand:"Daawat", desc:"Aromatic basmati rice", price:120, type:"Packet", quantityOptions:["1 Packet","2 Packet"]},
  {name:"Sunflower Oil", brand:"Fortune", desc:"Cold pressed oil", price:180, type:"Packet", quantityOptions:["1 Packet","2 Packet"]},
  {name:"Potato Chips", brand:"Lay's", desc:"Crunchy chips", price:20, type:"Packet", quantityOptions:["1 Packet","2 Packet"]}
];

let cart = [];

function renderProducts() {
  const container = document.getElementById('product-list');
  container.innerHTML = "";
  products.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <img src="${getProductImage(p)}" alt="${p.name}">
      <div>${p.name}</div>
      <span class="brand">${p.type==="Packet"?p.brand:"Loose"}</span>
      <div class="description">${p.desc}</div>
      <select class="quantity" id="qty-${i}">${p.quantityOptions.map(q=>`<option>${q}</option>`).join('')}</select>
      <button class="add-btn" onclick="addToCart(${i})">Add</button>
    `;
    container.appendChild(card);
  });
}

function getProductImage(p){
  switch(p.name){
    case "Sona Masoori Loose": return "https://i.imgur.com/1X2t1kK.jpg";
    case "Basmati Rice": return "https://i.imgur.com/1X2t1kK.jpg";
    case "Sunflower Oil": return "https://i.imgur.com/YUQv7rC.jpg";
    case "Potato Chips": return "https://i.imgur.com/xj1mjTl.jpg";
    default: return "https://via.placeholder.com/150";
  }
}

function addToCart(index){
  const qtySelect = document.getElementById(`qty-${index}`);
  const selectedQty = qtySelect.value;
  const product = {...products[index], selectedQty};
  cart.push(product);
  updateCart();
}

function updateCart(){
  let totalItems = cart.length;
  let totalPrice = cart.reduce((sum,p)=>sum+p.price,0);
  document.getElementById('cart-info').innerText = `Cart: ${totalItems} items | Total: ₹${totalPrice}`;
}

function orderNow(){
  let msg = cart.map(p=>`${p.name} - ${p.selectedQty} - ₹${p.price}`).join('\n');
  window.open(`https://wa.me/+917557820107?text=Order:%0A${encodeURIComponent(msg)}`,'_blank');
}

function adminAccess(){
  let password = prompt("Enter Admin Password");
  if(password==="Rishaan@2026"){ alert("Admin Access Granted!"); } 
  else { alert("Wrong Password"); }
}

renderProducts();
</script>

</body>
</html>
