<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishaan Daily Needs</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f6f9;
}
header{
  background:#0d6efd;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
h1{margin:0;font-size:20px;}
.lang-btn{
  background:white;
  color:#0d6efd;
  border:none;
  padding:5px 10px;
  margin-left:5px;
  cursor:pointer;
  border-radius:5px;
}
.container{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}
.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  text-align:center;
}
.price{
  font-weight:bold;
  margin:5px 0;
}
.qty-box{
  display:flex;
  justify-content:center;
  align-items:center;
}
.qty-box button{
  width:25px;
  height:25px;
}
.order-btn{
  width:100%;
  padding:12px;
  background:#25d366;
  color:white;
  border:none;
  font-size:16px;
  cursor:pointer;
  position:fixed;
  bottom:0;
}
.form-popup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:90%;
  max-width:350px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  border-radius:10px;
}
.form-popup input, .form-popup textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}
</style>
</head>
<body>

<header>
<h1>Rishaan Daily Needs</h1>
<div>
<button class="lang-btn" onclick="setLang('bn')">BN</button>
<button class="lang-btn" onclick="setLang('hi')">HI</button>
<button class="lang-btn" onclick="setLang('en')">EN</button>
</div>
</header>

<div class="container" id="productList"></div>

<button class="order-btn" onclick="openForm()">Place Order</button>

<div class="form-popup" id="orderForm">
<h3>Customer Details</h3>
<input type="text" id="custName" placeholder="Name" required>
<input type="text" id="custPhone" placeholder="Phone Number" required>
<textarea id="custAddress" placeholder="Address" required></textarea>
<button onclick="sendOrder()">Send to WhatsApp</button>
</div>

<script>
let lang="bn";

let products=[
{ id:1, name:{bn:"চাল",hi:"चावल",en:"Rice"}, price:50, qty:0, unit:"kg"},
{ id:2, name:{bn:"চিনি",hi:"चीनी",en:"Sugar"}, price:45, qty:0, unit:"kg"},
{ id:3, name:{bn:"তেল",hi:"तेल",en:"Oil"}, price:120, qty:0, unit:"pcs"},
{ id:4, name:{bn:"ডাল",hi:"दाल",en:"Lentils"}, price:90, qty:0, unit:"kg"}
];

function render(){
let html="";
products.forEach(p=>{
html+=`
<div class="card">
<h3>${p.name[lang]}</h3>
<div class="price">Rate: ${p.price}</div>
<div class="qty-box">
<button onclick="changeQty(${p.id},-1)">-</button>
<span style="margin:0 10px">${p.qty}</span>
<button onclick="changeQty(${p.id},1)">+</button>
</div>
</div>
`;
});
document.getElementById("productList").innerHTML=html;
}

function changeQty(id,val){
let p=products.find(x=>x.id==id);
p.qty=Math.max(0,p.qty+val);
render();
}

function setLang(l){
lang=l;
render();
}

function openForm(){
document.getElementById("orderForm").style.display="block";
}

function sendOrder(){
let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let address=document.getElementById("custAddress").value;

if(!name||!phone||!address){
alert("Please fill all details");
return;
}

let now=new Date();
let date=now.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
let time=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

let msg="🛒 Rishaan Daily Needs Order\n\n";
msg+="Order Date: "+date+"\n";
msg+="Order Time: "+time+"\n\n";
msg+="Product List:\n";

let count=1;
products.forEach(p=>{
if(p.qty>0){
msg+=count+". "+p.name.en+" - "+p.qty+" "+p.unit+"\n";
count++;
}
});

msg+="\n----------------------\n\n";
msg+="Customer Details:\n";
msg+="Name: "+name+"\n";
msg+="Phone: "+phone+"\n";
msg+="Address: "+address+"\n\n";
msg+="Delivery Charge: \n";

let url="https://wa.me/917557820107?text="+encodeURIComponent(msg);
window.open(url,"_blank");
}

render();
</script>

</body>
</html>
