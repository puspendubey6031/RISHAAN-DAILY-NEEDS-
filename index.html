<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishaan Daily Needs</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
header { background:#27ae60; color:white; padding:20px; text-align:center; }
header h1 { margin:0; font-size:22px; }
header p { margin:5px 0 0 0; font-size:14px; }
.container { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
.category { background:white; border-radius:10px; padding:15px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.category h2 { margin-top:0; color:#27ae60; font-size:18px; }
.product { display:flex; align-items:flex-start; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px; }
.product img { width:60px; height:60px; object-fit:cover; border-radius:5px; margin-right:10px; }
.product-details { flex:1; }
.product-details h4 { margin:0 0 5px 0; font-size:14px; }
.product-details p { margin:0; font-size:12px; color:#555; }
.product-details .price { font-weight:bold; color:#e74c3c; margin-top:5px; }
.quantity { width:60px; margin-top:5px; }
.unit-select { margin-top:5px; }
.order-btn { margin-top:10px; background:#27ae60; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer; font-size:14px; }
.order-btn:hover { background:#2ecc71; }
@media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>Rishaan Daily Needs</h1>
  <p>Select products and send order via WhatsApp</p>
</header>
<div class="container" id="categories"></div>
<script>
const categories = [
  {name:'Chal (Rice)', products:[
      {name:'Basmati Rice', company:'ABC', description:'Premium basmati rice', price:60, img:'https://via.placeholder.com/60'},
      {name:'Sona Masuri', company:'XYZ', description:'Soft texture rice', price:55, img:'https://via.placeholder.com/60'},
      {name:'Ponni Rice', company:'LMN', description:'High aroma rice', price:50, img:'https://via.placeholder.com/60'},
      {name:'Gobindobhog', company:'PQR', description:'Traditional aromatic rice', price:70, img:'https://via.placeholder.com/60'},
      {name:'IR64', company:'ABC', description:'Common daily rice', price:45, img:'https://via.placeholder.com/60'},
      {name:'Kolam Rice', company:'XYZ', description:'Medium grain rice', price:48, img:'https://via.placeholder.com/60'},
      {name:'Sharbati Rice', company:'LMN', description:'Fine long grain', price:65, img:'https://via.placeholder.com/60'},
      {name:'Ambemohar', company:'PQR', description:'Fragrant rice', price:75, img:'https://via.placeholder.com/60'},
      {name:'Matta Rice', company:'ABC', description:'Brownish red rice', price:55, img:'https://via.placeholder.com/60'},
      {name:'Koshihikari', company:'XYZ', description:'Japanese rice', price:80, img:'https://via.placeholder.com/60'}
  ]},
  {name:'Dal (Lentils)', products:[
      {name:'Moong Dal', company:'PQR', description:'Yellow moong dal', price:120, img:'https://via.placeholder.com/60'},
      {name:'Masoor Dal', company:'LMN', description:'Red lentils', price:100, img:'https://via.placeholder.com/60'},
      {name:'Toor Dal', company:'ABC', description:'Pigeon peas', price:110, img:'https://via.placeholder.com/60'},
      {name:'Urad Dal', company:'XYZ', description:'Black gram dal', price:115, img:'https://via.placeholder.com/60'},
      {name:'Chana Dal', company:'PQR', description:'Split chickpeas', price:90, img:'https://via.placeholder.com/60'},
      {name:'Rajma Dal', company:'LMN', description:'Red kidney bean dal', price:130, img:'https://via.placeholder.com/60'},
      {name:'Black Lentil', company:'ABC', description:'Whole urad', price:125, img:'https://via.placeholder.com/60'},
      {name:'Green Gram', company:'XYZ', description:'Whole moong', price:120, img:'https://via.placeholder.com/60'},
      {name:'Soybean Dal', company:'PQR', description:'Protein rich', price:140, img:'https://via.placeholder.com/60'},
      {name:'Horse Gram', company:'LMN', description:'Traditional dal', price:100, img:'https://via.placeholder.com/60'}
  ]},
  {name:'Masala', products:[
      {name:'Turmeric Powder', company:'LMN', description:'Pure turmeric powder', price:80, img:'https://via.placeholder.com/60'},
      {name:'Chilli Powder', company:'PQR', description:'Spicy red chilli powder', price:70, img:'https://via.placeholder.com/60'},
      {name:'Coriander Powder', company:'ABC', description:'Ground coriander', price:60, img:'https://via.placeholder.com/60'},
      {name:'Garam Masala', company:'XYZ', description:'Special blend', price:90, img:'https://via.placeholder.com/60'},
      {name:'Cumin Powder', company:'LMN', description:'Ground cumin', price:55, img:'https://via.placeholder.com/60'},
      {name:'Fennel Powder', company:'PQR', description:'Aromatic fennel', price:65, img:'https://via.placeholder.com/60'},
      {name:'Black Pepper', company:'ABC', description:'Whole black pepper', price:100, img:'https://via.placeholder.com/60'},
      {name:'Cardamom', company:'XYZ', description:'Green cardamom', price:120, img:'https://via.placeholder.com/60'},
      {name:'Cloves', company:'LMN', description:'Whole cloves', price:90, img:'https://via.placeholder.com/60'},
      {name:'Cinnamon', company:'PQR', description:'Ceylon cinnamon', price:85, img:'https://via.placeholder.com/60'}
  ]}
  // অন্যান্য ক্যাটেগরি একইভাবে 10–12 প্রোডাক্ট
];

const container = document.getElementById('categories');

categories.forEach(cat => {
  const catDiv = document.createElement('div');
  catDiv.className='category';
  const h2 = document.createElement('h2');
  h2.textContent=cat.name;
  catDiv.appendChild(h2);

  cat.products.forEach(prod => {
    const prodDiv = document.createElement('div');
    prodDiv.className='product';

    const img = document.createElement('img');
    img.src=prod.img;
    prodDiv.appendChild(img);

    const details = document.createElement('div');
    details.className='product-details';
    const title = document.createElement('h4');
    title.textContent=`${prod.name} (${prod.company})`;
    const desc = document.createElement('p');
    desc.textContent=prod.description;
    const price = document.createElement('p');
    price.className='price';
    price.textContent=`Price: ₹${prod.price}`;
    details.appendChild(title);
    details.appendChild(desc);
    details.appendChild(price);

    const qty = document.createElement('input');
    qty.type='number'; qty.min='0'; qty.value='0'; qty.className='quantity';
    details.appendChild(qty);

    const unit = document.createElement('select');
    unit.className='unit-select';
    ['grams','kg','kilo'].forEach(u=>{
      const opt = document.createElement('option'); opt.value=u; opt.textContent=u; unit.appendChild(opt);
    });
    details.appendChild(unit);

    prodDiv.appendChild(details);
    catDiv.appendChild(prodDiv);

    prod.inputElement = qty;
    prod.unitElement = unit;
  });

  container.appendChild(catDiv);
});

// WhatsApp Order Button at the end
const orderBtn = document.createElement('button');
orderBtn.className='order-btn';
orderBtn.textContent='Order All via WhatsApp';
orderBtn.onclick = ()=>{
  let message='Rishaan Daily Needs Order:\\n';
  let hasItem=false;
  categories.forEach(cat=>{
    cat.products.forEach(prod=>{
      if(prod.inputElement && prod.inputElement.value>0){
        message+=`${prod.name} (${prod.company}) - ${prod.inputElement.value} ${prod.unitElement.value} - ₹${prod.price}\\n`;
        hasItem=true;
      }
    });
  });
  if(!hasItem){
    alert('Please select at least one item!');
    return;
  }
  const waLink=`https://wa.me/917557820107?text=${encodeURIComponent(message)}`;
  window.open(waLink,'_blank');
};
document.body.appendChild(orderBtn);
</script>
</body>
</html>
