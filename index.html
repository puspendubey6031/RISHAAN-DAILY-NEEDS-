<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishaan Daily Needs</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2}

/* Banner */
.banner{
background:linear-gradient(45deg,#0d6efd,#25d366);
color:white;
padding:25px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* Category */
.categories{
display:flex;
overflow-x:auto;
gap:15px;
padding:15px;
background:white;
}
.cat{
text-align:center;
cursor:pointer;
}
.cat img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:3px solid #25d366;
}
.cat p{margin:5px 0 0;font-size:14px}

/* Product */
.container{padding:15px}
.card{
background:white;
border-radius:12px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
padding:15px;
margin-bottom:15px;
display:none;
}
.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}
.price{font-weight:bold;margin:8px 0}
input[type="number"]{
width:100px;
padding:8px;
font-size:16px;
}
select{padding:6px}

.summary{
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

.order-btn{
width:100%;
padding:15px;
background:#25d366;
color:white;
font-size:18px;
border:none;
border-radius:8px;
margin-top:10px;
}

/* Popup */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
width:90%;
max-width:350px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}
.popup input, .popup textarea{
width:100%;
padding:8px;
margin-bottom:10px;
}
.whatsapp-btn{
background:#25d366;
color:white;
padding:12px;
border:none;
width:100%;
font-size:16px;
border-radius:8px;
}
.admin{
margin-top:8px;
font-size:13px;
}
.admin input{
width:70px;
}
</style>
</head>
<body>

<div class="banner">🛒 Rishaan Daily Needs</div>

<div class="categories">
<div class="cat" onclick="showCategory('rice')">
<img src="https://via.placeholder.com/100">
<p>Rice</p>
</div>
<div class="cat" onclick="showCategory('sugar')">
<img src="https://via.placeholder.com/100">
<p>Sugar</p>
</div>
</div>

<div class="container">

<div class="card rice">
<img src="https://via.placeholder.com/300x150">
<h3>Rice</h3>
<div class="price">₹ <span id="price1"></span></div>
Qty: <input type="number" id="qty1" min="0" oninput="updateTotal()">
<select id="unit1">
<option>kg</option>
<option>gram</option>
<option>packet</option>
</select>

<div class="admin">
Admin Price: 
<input type="number" id="admin1">
<button onclick="savePrice(1)">Save</button>
</div>
</div>

<div class="card sugar">
<img src="https://via.placeholder.com/300x150">
<h3>Sugar</h3>
<div class="price">₹ <span id="price2"></span></div>
Qty: <input type="number" id="qty2" min="0" oninput="updateTotal()">
<select id="unit2">
<option>kg</option>
<option>gram</option>
<option>packet</option>
</select>

<div class="admin">
Admin Price: 
<input type="number" id="admin2">
<button onclick="savePrice(2)">Save</button>
</div>
</div>

<div class="summary" id="summary">
Total Items: 0 | Total Amount: ₹0
</div>

<button class="order-btn" onclick="openForm()">Place Order</button>

</div>

<div class="popup" id="popup">
<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>
<button class="whatsapp-btn" onclick="sendOrder()">Send to WhatsApp</button>
</div>

<script>
let prices={
1:localStorage.getItem("price1")||50,
2:localStorage.getItem("price2")||40
};

function loadPrices(){
document.getElementById("price1").innerText=prices[1];
document.getElementById("price2").innerText=prices[2];
document.getElementById("admin1").value=prices[1];
document.getElementById("admin2").value=prices[2];
}
loadPrices();

function savePrice(id){
let val=document.getElementById("admin"+id).value;
localStorage.setItem("price"+id,val);
prices[id]=val;
loadPrices();
updateTotal();
}

function showCategory(cat){
document.querySelectorAll('.card').forEach(c=>c.style.display="none");
document.querySelectorAll('.'+cat).forEach(c=>c.style.display="block");
}

function updateTotal(){
let totalItems=0;
let totalAmount=0;

[1,2].forEach(id=>{
let qty=parseFloat(document.getElementById("qty"+id).value)||0;
totalItems+=qty;
totalAmount+=qty*prices[id];
});

document.getElementById("summary").innerText=
"Total Items: "+totalItems+" | Total Amount: ₹"+totalAmount;
}

function openForm(){
if(document.getElementById("summary").innerText.includes("₹0")){
alert("Please select product first");
return;
}
document.getElementById("popup").style.display="block";
}

function sendOrder(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name||!phone||!address){alert("Fill all details");return;}

let msg="🛒 Rishaan Daily Needs Order\n\n";

[1,2].forEach(id=>{
let qty=document.getElementById("qty"+id).value;
let unit=document.getElementById("unit"+id).value;
if(qty>0){
let pname=id==1?"Rice":"Sugar";
msg+=pname+" - "+qty+" "+unit+"\n";
}
});

msg+="\nTotal: "+document.getElementById("summary").innerText;
msg+="\n\nCustomer Details:\n";
msg+="Name: "+name+"\n";
msg+="Phone: "+phone+"\n";
msg+="Address: "+address;

window.open("https://wa.me/917557820107?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
