<script>
let adminPassword = "Rishan@2026";
let isAdmin = false;
let currentLang = 'en';
let minOrder = 1000;
let products = [

  {id:2, name:{en:'India Gate Basmati',bn:'ইন্ডিয়া গেট বাসমতি',hi:'इंडिया गेट बासमती'}, desc:{en:'Premium Basmati Rice',bn:'প্রিমিয়াম বাসমতি চাল',hi:'प्रीमियम बासमती चावल'}, price:120, category:'rice', img:'https://via.placeholder.com/120?text=Rice', type:'Packet'},
  {id:3, name:{en:'Masoor Dal',bn:'মসুর ডাল',hi:'मसूर दाल'}, desc:{en:'Good quality dal',bn:'ভালো মানের ডাল',hi:'अच्छी गुणवत्ता वाली दाल'}, price:80, category:'dal', img:'https://via.placeholder.com/120?text=Dal', type:'Loose'},
  {id:4, name:{en:'Turmeric Powder',bn:'হলুদের গুঁড়া',hi:'हल्दी पाउडर'}, desc:{en:'Spice for cooking',bn:'রান্নার জন্য মসলা',hi:'खाना पकाने के लिए मसाला'}, price:50, category:'masala', img:'https://via.placeholder.com/120?text=Masala', type:'Packet'}
];
let cart = [];function scrollToCategory(cat){ let elem = document.getElementById('products-'+cat); if(elem) elem.scrollIntoView({behavior:'smooth'}); }

function renderProducts(){ let container = document.getElementById('products'); container.innerHTML=''; let cats = [...new Set(products.map(p=>p.category))]; cats.forEach(cat=>{ let catDiv = document.createElement('div'); catDiv.id='products-'+cat; let catHeader = document.createElement('h2'); catHeader.textContent = cat.charAt(0).toUpperCase() + cat.slice(1); catDiv.appendChild(catHeader); products.filter(p=>p.category===cat).forEach(p=>{ let div = document.createElement('div'); div.className='product'; div.innerHTML=<img src='${p.img}'><div class='product-name'>${p.name[currentLang]}</div><div class='product-desc'>${p.desc[currentLang]}</div><div class='product-price'>₹${p.price} per ${p.type==='Loose'?'kg':'pc'}</div><div class='quantity'><input type='number' min='1' max='100' value='1' id='qty-${p.id}'></div><button onclick='addToCart(${p.id})'>Add to Cart</button>; catDiv.appendChild(div); }); container.appendChild(catDiv); }); }

function addToCart(id){ let p = products.find(x=>x.id===id); let qty = parseFloat(document.getElementById('qty-'+id).value); if(qty*p.price<minOrder){ alert('Minimum order ₹'+minOrder); return; } let existing = cart.find(c=>c.id===id); if(existing){ existing.qty+=qty; } else { cart.push({id:id, qty:qty}); } renderCart(); }

function renderCart(){ let container = document.getElementById('cartItems'); container.innerHTML=''; cart.forEach(c=>{ let p = products.find(x=>x.id===c.id); let div = document.createElement('div'); div.className='cart-item'; div.textContent = ${p.name[currentLang]} - ${c.qty} ${p.type==='Loose'?'kg':'pc'}; container.appendChild(div); }); document.getElementById('cartDrawer').classList.add('open'); }

function checkout(){ let now = new Date(); let custName = document.getElementById('custName').value || 'N/A'; let custPhone = document.getElementById('custPhone').value || 'N/A'; let custAddress = document.getElementById('custAddress').value || 'N/A';
