<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishaan Daily Needs - Mini Demo</title>
<style>
body { font-family: Arial; margin:0; padding:0; background:#f5f5f5; }
header { background: #27ae60; color:white; padding:20px; text-align:center; position:relative; }
header img { position:absolute; left:20px; top:15px; width:50px; height:50px; border-radius:50%; object-fit:cover; }
header h1 { margin:0; font-size:28px; font-weight:bold; }
header p { margin:5px 0 0 0; font-size:14px; }
.container { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
.category { background:white; border-radius:10px; padding:15px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.category h2 { margin-top:0; color:#27ae60; font-size:18px; }
.product { display:flex; align-items:flex-start; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px; }
.product img { width:70px; height:70px; object-fit:cover; border-radius:5px; margin-right:10px; }
.product-details { flex:1; }
.product-details h4 { margin:0 0 5px 0; font-size:14px; }
.product-details p { margin:0; font-size:12px; color:#555; }
.quantity { width:80px; font-size:14px; padding:4px; margin-top:5px; }
.unit-select { margin-top:5px; padding:4px; }
.price { font-weight:bold; color:#e74c3c; margin-top:5px; }
.order-btn { margin-top:15px; background:#27ae60; color:white; border:none; padding:12px; width:100%; border-radius:5px; cursor:pointer; font-size:16px; }
.order-btn:hover { background:#2ecc71; }
@media (max-width: 600px) { .container { grid-template-columns: 1fr; } header img { position:static; display:block; margin:0 auto 10px auto; } }
</style>
</head>
<body>

<header>
  <img src="https://images.unsplash.com/photo-1598514982652-040d5da1c7ab?auto=format&fit=crop&w=50&h=50" alt="Logo">
  <h1>Rishaan Daily Needs</h1>
  <p>Fresh Quality Foods</p>
</header>

<div class="container" id="categories"></div>

<script>
const categories = [
  {name:'Chal (Rice)', products:[
      {name:'Basmati Rice', company:'India Gate', description:'Premium long grain rice', price:'', img:'https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=70&h=70'},
      {name:'Sona Masuri Rice', company:'LUZ', description:'Soft texture rice', price:'', img:'https://images.unsplash.com/photo-1589831234345-d1e07fa2d7b1?auto=format&fit=crop&w=70&h=70'}
  ]},
  {name:'Dal (Lentils)', products:[
      {name:'Moong Dal', company:'Patanjali', description:'Yellow moong dal', price:'', img:'https://images.unsplash.com/photo-1604882357360-2d2e8bda3e6f?auto=format&fit=crop&w=70&h=70'},
      {name:'Masoor Dal', company:'LUZ', description:'Red lentils', price:'', img:'https://images.unsplash.com/photo-1604882357360-2d2e8bda3e6f?auto=format&fit=crop&w=70&h=70'}
  ]}
];

const container = document.getElementById('categories');
categories.forEach(cat=>{
  const catDiv = document.createElement('div');
  catDiv.className='category';
  const h2 = document.createElement('h2');
  h2.textContent=cat.name;
  catDiv.appendChild(h2);

  cat.products.forEach(prod=>{
    const prodDiv = document.createElement('div');
    prodDiv.className='product';

    const img = document.createElement('img'); img.src=prod.img; prodDiv.appendChild(img);

    const details = document.createElement('div'); details.className='product-details';
    const title = document.createElement('h4'); title.textContent=`${prod.name} - ${prod.company}`;
    const desc = document.createElement('p'); desc.textContent=prod.description;
    const price = document.createElement('input'); price.type='text'; price.placeholder='Enter price (₹)'; price.className='price';
    details.appendChild(title); details.appendChild(desc); details.appendChild(price);

    const qty = document.createElement('input'); qty.type='number'; qty.min='0'; qty.value='0'; qty.className='quantity';
    details.appendChild(qty);
    const unit = document.createElement('select'); unit.className='unit-select';
    ['grams','kg','kilo'].forEach(u=>{ const opt = document.createElement('option'); opt.value=u; opt.textContent=u; unit.appendChild(opt); });
    details.appendChild(unit);

    prodDiv.appendChild(details);
    catDiv.appendChild(prodDiv);

    prod.inputElement=qty; prod.unitElement=unit; prod.priceElement=price;
  });

  container.appendChild(catDiv);
});

const orderBtn = document.createElement('button'); orderBtn.className='order-btn'; orderBtn.textContent='Order All via WhatsApp';
orderBtn.onclick=()=>{
  let message='Rishaan Daily Needs Order:\\n'; let hasItem=false;
  categories.forEach(cat=>{ cat.products.forEach(prod=>{
    if(prod.inputElement && prod.inputElement.value>0){
      let p = prod.priceElement.value ? `₹${prod.priceElement.value} per ${prod.unitElement.value}` : 'Price not set';
      message+=`${prod.name} (${prod.company}) - ${prod.inputElement.value} ${prod.unitElement.value} - ${p}\\n`;
      hasItem=true;
    }
  });});
  if(!hasItem){ alert('Please select at least one item!'); return; }
  const waLink=`https://wa.me/917557820107?text=${encodeURIComponent(message)}`;
  window.open(waLink,'_blank');
};
document.body.appendChild(orderBtn);
</script>

</body>
</html>
